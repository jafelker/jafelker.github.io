<div *ngFor='let project of projects'>
    <md-grid-list cols='3' class='project-list-item'>
        <md-grid-tile class='project-info'>
            <md-list>
                <md-list-item>
                    <span md-line class='project-title'>
                        <a [href]='project.link'><h3 class='bold' [innerHTML]='project.title'></h3></a>
                        <a [href]='project.repo'><small>Repo</small></a>
                    </span>
                    <p md-line class='project-description'>
                        {{ project.description }}
                    </p>
                </md-list-item>
            </md-list>
        </md-grid-tile>
        <md-grid-tile colspan='2'>
            <a [href]='project.link'>
                <img class='project-image' [src]='"assets/images/" + project.img' />
            </a>
        </md-grid-tile>
    </md-grid-list>
</div>
